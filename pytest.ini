[pytest]
testpaths = tests
python_files = test_*.py
addopts = -q --tb=short
filterwarnings =
    ignore::DeprecationWarning
markers =
    slow: subprocess or network-heavy integration (use pytest -m slow to run only these)
    confidence_gate: safety tests that must ALL pass before any EXECUTION_MODE change away from MANUAL
    ml: tests requiring ML dependencies (lightgbm, shap)
    network: tests requiring network access
