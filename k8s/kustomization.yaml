apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: opb-trading

resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
  - configmap.yaml
  - pvc.yaml
  - secret.yaml
  - hpa.yaml

generatorOptions:
  disableNameSuffixHash: true

commonLabels:
  app.kubernetes.io/name: opb-index-options-bot
  app.kubernetes.io/component: trading-platform
  app.kubernetes.io/version: "2.53.0"
