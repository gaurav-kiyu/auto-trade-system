---
# OPB Bot — HorizontalPodAutoscaler
# ─────────────────────────────────────────────────────────────────────────────
# Scales the bot deployment based on Prometheus metrics exposed at :9090.
#
# Scaling triggers (requires Prometheus Adapter):
#   - opb_signal_score_last < 30  → trade activity is low, scale down
#   - opb_trades_total rate > 10/min → high trade activity, scale up
#   - opb_reconciliation_lag_seconds > 60 → reconciliation backlog, scale up
#
# Without Prometheus Adapter, falls back to CPU-based scaling.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: opb-hpa
  labels:
    app: opb-bot
    tier: trading
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: opb-deployment
  minReplicas: 1
  maxReplicas: 5
  metrics:
    # ── CPU-based scaling (baseline) ──────────────────────────────────────
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # ── Memory-based scaling (fallback) ───────────────────────────────────
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300   # Wait 5 min before scaling down
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60    # Quick to scale up
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
