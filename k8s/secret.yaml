apiVersion: v1
kind: Secret
metadata:
  name: opb-secrets
  namespace: opb-trading
  labels:
    app.kubernetes.io/name: opb-index-options-bot
type: Opaque
stringData:
  # ⚠️ Replace with actual plaintext values (K8s encodes to base64 automatically)
  # For generating random values:
  #   JWT_SECRET:  openssl rand -base64 32
  #   DB_ENCRYPTION_KEY: openssl rand -hex 32
  #
  # Zerodha Kite credentials (if using Kite)
  KITE_API_KEY: ""
  KITE_API_SECRET: ""
  KITE_ACCESS_TOKEN: ""
  KITE_USER_ID: ""
  KITE_TOTP_KEY: ""

  # Angel Broking credentials (if using Angel)
  ANGEL_CLIENT_ID: ""
  ANGEL_PIN: ""
  ANGEL_TOTP_KEY: ""

  # Telegram notifications
  TELEGRAM_BOT_TOKEN: ""
  TELEGRAM_CHAT_ID: ""

  # Web dashboard
  JWT_SECRET: ""
  DASHBOARD_ADMIN_PASSWORD: ""

  # Database encryption (optional)
  DB_ENCRYPTION_KEY: ""
