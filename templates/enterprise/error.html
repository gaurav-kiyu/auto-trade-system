<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ code }} - OPB Enterprise</title>
    <script src="/static/tailwind.min.js"></script>
    <link rel="stylesheet" href="/static/fontawesome.min.css">
    <script nonce="{{ nonce }}">
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { dark: { 50: '#f8fafc', 100: '#e2e8f0', 200: '#cbd5e1', 300: '#94a3b8', 400: '#64748b', 500: '#475569', 600: '#334155', 700: '#1e293b', 800: '#1a1f2e', 900: '#0f1319', 950: '#080b10' }, brand: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a' } } } } }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: #080b10; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div style="text-align: center; max-width: 480px; padding: 2rem;">
        <div style="font-size: 5rem; font-weight: 800; color: #1e293b; line-height: 1;">{{ code }}</div>
        <div style="margin: 1.5rem 0;">
            <i class="fas {{ 'fa-exclamation-triangle' if code == 404 else 'fa-bug' }}" style="font-size: 2.5rem; color: #3b82f6;"></i>
        </div>
        <h1 style="font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem;">
            {% if code == 404 %}
            Page Not Found
            {% elif code == 500 %}
            Server Error
            {% else %}
            Error
            {% endif %}
        </h1>
        <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 2rem;">{{ message }}</p>
        <a href="/" class="btn btn-primary" style="display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.6rem 1.5rem; border-radius: 0.5rem; font-size: 0.9rem; font-weight: 500; background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; text-decoration: none;">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
    </div>
</body>
</html>
