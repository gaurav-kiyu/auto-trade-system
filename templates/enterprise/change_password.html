<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password — OPB Enterprise</title>
    <script src="/static/tailwind.min.js"></script>
    <link rel="stylesheet" href="/static/fontawesome.min.css">
    <script nonce="{{ nonce }}">
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { dark: { 50: '#f8fafc', 100: '#e2e8f0', 200: '#cbd5e1', 300: '#94a3b8', 400: '#64748b', 500: '#475569', 600: '#334155', 700: '#1e293b', 800: '#0f1729', 900: '#0a0e1a', 950: '#060912' }, brand: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a' } } } }
        }
    </script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background:#060912; color:#e2e8f0; min-height:100vh; display:flex; align-items:center; justify-content:center; background-image: radial-gradient(ellipse at 50% -30%, rgba(59,130,246,.08) 0%, transparent 60%); }
        .card { width:100%; max-width:440px; padding:2rem; }
        .inner { background:linear-gradient(135deg,#0f1729 0%,#0a0e1a 100%); border:1px solid rgba(148,163,184,.08); border-radius:1.25rem; padding:2.5rem 2rem; box-shadow:0 25px 60px rgba(0,0,0,.4); }
        h1 { font-size:1.1rem; font-weight:600; color:#f1f5f9; text-align:center; margin-bottom:.35rem; }
        .subtitle { text-align:center; font-size:.78rem; color:#64748b; margin-bottom:1.5rem; }
        .form-group { margin-bottom:1.1rem; }
        label { display:block; font-size:.72rem; color:#94a3b8; margin-bottom:.35rem; font-weight:500; text-transform:uppercase; letter-spacing:.03em; }
        input { width:100%; padding:.65rem .85rem; background:#0a0e1a; border:1px solid rgba(148,163,184,.12); border-radius:.6rem; color:#e2e8f0; font-size:.85rem; transition:all .15s; outline:none; }
        input:focus { border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,.1); }
        .btn { width:100%; padding:.7rem; border-radius:.6rem; font-size:.85rem; font-weight:600; cursor:pointer; border:none; transition:all .12s; display:flex; align-items:center; justify-content:center; gap:.5rem; }
        .btn-primary { background:linear-gradient(135deg,#3b82f6,#2563eb); color:#fff; }
        .btn-primary:hover { opacity:.92; transform:translateY(-1px); box-shadow:0 8px 25px -8px rgba(59,130,246,.3); }
        .btn-ghost { background:transparent; color:#94a3b8; border:1px solid rgba(148,163,184,.12); }
        .btn-ghost:hover { background:rgba(148,163,184,.06); color:#e2e8f0; }
        .error-msg { background:rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.15); border-radius:.5rem; padding:.5rem .75rem; font-size:.75rem; color:#f87171; margin-bottom:1rem; display:none; }
        .error-msg.visible { display:block; }
        .success-msg { background:rgba(34,197,94,.08); border:1px solid rgba(34,197,94,.15); border-radius:.5rem; padding:.5rem .75rem; font-size:.75rem; color:#4ade80; margin-bottom:1rem; display:none; }
        .success-msg.visible { display:block; }
        .strength-bar { height:3px; border-radius:2px; margin-top:.35rem; transition:all .3s; }
        .footer { text-align:center; margin-top:1.25rem; }
        .footer a { color:#64748b; font-size:.75rem; text-decoration:none; }
        .footer a:hover { color:#94a3b8; }
    </style>
</head>
<body>
    <div class="card">
        <div class="inner">
            <h1><i class="fas fa-key" style="color:#3b82f6;margin-right:.5rem;"></i>Change Password</h1>
            <p class="subtitle">{{ 'Set your new password' if request.query_params.get('force') else 'Update your account password' }}</p>
            <div class="error-msg" id="errorMsg"></div>
            <div class="success-msg" id="successMsg"></div>
            <form id="passwordForm">
                {% if request.query_params.get('force') %}
                <input type="hidden" id="forceReset" value="true">
                {% endif %}
                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" id="currentPassword" placeholder="Enter current password" required>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="newPassword" placeholder="Min 8 chars, uppercase, lowercase, digit, special" required>
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirmPassword" placeholder="Re-enter new password" required>
                </div>
                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <span id="btnText">Update Password</span>
                    <span class="spinner" id="btnSpinner" style="display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;"></span>
                </button>
            </form>
            {% if not request.query_params.get('force') %}
            <div class="footer">
                <a href="/">&larr; Back to Dashboard</a>
            </div>
            {% endif %}
        </div>
    </div>
    <style>@keyframes spin { to { transform:rotate(360deg); } }</style>
    <script nonce="{{ nonce }}">
        const strengthBar = document.getElementById('strengthBar');
        document.getElementById('newPassword').addEventListener('input', function() {
            const pwd = this.value;
            let score = 0;
            if (pwd.length >= 8) score += 25;
            if (/[A-Z]/.test(pwd)) score += 20;
            if (/[a-z]/.test(pwd)) score += 20;
            if (/\d/.test(pwd)) score += 15;
            if (/[^a-zA-Z0-9]/.test(pwd)) score += 20;
            strengthBar.style.width = score + '%';
            strengthBar.style.background = score < 40 ? '#ef4444' : score < 70 ? '#f59e0b' : '#22c55e';
        });

        document.getElementById('passwordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('btnSpinner');
            errorMsg.classList.remove('visible');
            successMsg.classList.remove('visible');

            const current = document.getElementById('currentPassword').value;
            const newPwd = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            if (newPwd !== confirm) { errorMsg.textContent = 'Passwords do not match'; errorMsg.classList.add('visible'); return; }
            if (newPwd.length < 8) { errorMsg.textContent = 'Password must be at least 8 characters'; errorMsg.classList.add('visible'); return; }

            btn.disabled = true;
            btnText.textContent = 'Updating...';
            spinner.style.display = 'inline-block';

            try {
                const res = await fetch('/api/auth/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ current_password: current, new_password: newPwd }),
                    credentials: 'include',
                });
                const data = await res.json();
                if (res.ok) {
                    successMsg.textContent = 'Password updated successfully';
                    successMsg.classList.add('visible');
                    btnText.textContent = 'Done';
                    spinner.style.display = 'none';
                    setTimeout(() => { window.location.href = '/'; }, 1500);
                } else {
                    errorMsg.textContent = data.detail || 'Password change failed';
                    errorMsg.classList.add('visible');
                    btn.disabled = false;
                    btnText.textContent = 'Update Password';
                    spinner.style.display = 'none';
                }
            } catch (err) {
                errorMsg.textContent = 'Connection error';
                errorMsg.classList.add('visible');
                btn.disabled = false;
                btnText.textContent = 'Update Password';
                spinner.style.display = 'none';
            }
        });
    </script>
</body>
</html>
