<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPB Enterprise — Login</title>
    <script src="/static/tailwind.min.js"></script>
    <link rel="stylesheet" href="/static/fontawesome.min.css">
    <script nonce="{{ nonce }}">
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: { 50: '#f8fafc', 100: '#e2e8f0', 200: '#cbd5e1', 300: '#94a3b8', 400: '#64748b', 500: '#475569', 600: '#334155', 700: '#1e293b', 800: '#0f1729', 900: '#0a0e1a', 950: '#060912' },
                        brand: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a' },
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: #060912; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background-image: radial-gradient(ellipse at 50% -20%, rgba(59,130,246,.08) 0%, transparent 60%); }
        .login-container { width: 100%; max-width: 400px; padding: 2rem; }
        .login-card { background: linear-gradient(135deg, #0f1729 0%, #0a0e1a 100%); border: 1px solid rgba(148,163,184,.08); border-radius: 1.25rem; padding: 2.5rem 2rem; box-shadow: 0 25px 60px rgba(0,0,0,.4); }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo-icon { width: 52px; height: 52px; background: linear-gradient(135deg, #3b82f6, #1d4ed8); border-radius: 14px; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.25rem; color: #fff; margin-bottom: .75rem; }
        .logo h1 { font-size: 1.2rem; font-weight: 600; color: #f1f5f9; }
        .logo p { font-size: .78rem; color: #64748b; margin-top: .2rem; }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; font-size: .75rem; color: #94a3b8; margin-bottom: .4rem; font-weight: 500; text-transform: uppercase; letter-spacing: .03em; }
        input { width: 100%; padding: .7rem .85rem; background: #0a0e1a; border: 1px solid rgba(148,163,184,.12); border-radius: .65rem; color: #e2e8f0; font-size: .9rem; transition: all .15s; outline: none; }
        input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.1); }
        input::placeholder { color: #475569; }
        .btn { width: 100%; padding: .75rem; border-radius: .65rem; font-size: .9rem; font-weight: 600; cursor: pointer; border: none; transition: all .15s; display: flex; align-items: center; justify-content: center; gap: .5rem; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff; }
        .btn-primary:hover { opacity: .92; transform: translateY(-1px); box-shadow: 0 8px 25px -8px rgba(59,130,246,.3); }
        .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }
        .error-msg { background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.15); border-radius: .5rem; padding: .6rem .8rem; font-size: .78rem; color: #f87171; margin-bottom: 1rem; display: none; }
        .error-msg.visible { display: block; }
        .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.2); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; display: none; }
        .spinner.visible { display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .footer { text-align: center; margin-top: 1.5rem; font-size: .72rem; color: #475569; }
        .security-badge { display: flex; align-items: center; justify-content: center; gap: .35rem; margin-top: 1rem; font-size: .68rem; color: #475569; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">O</div>
                <h1>OPB Enterprise</h1>
                <p>Index Options Trading Platform</p>
            </div>
            <div class="error-msg" id="errorMsg"></div>
            <form id="loginForm" autocomplete="off">
                <!-- Step 1: Credentials -->
                <div id="loginStep1">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="username" required autofocus>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary" id="loginBtn">
                        <span id="btnText">Sign In</span>
                        <span class="spinner" id="btnSpinner"></span>
                    </button>

                    <!-- SSO Divider -->
                    <div id="ssoDivider" style="display:none;margin:1.25rem 0 .75rem;text-align:center;">
                        <div style="display:flex;align-items:center;gap:.75rem;">
                            <span style="flex:1;height:1px;background:rgba(148,163,184,.12);"></span>
                            <span style="font-size:.72rem;color:#475569;white-space:nowrap;">or continue with</span>
                            <span style="flex:1;height:1px;background:rgba(148,163,184,.12);"></span>
                        </div>
                    </div>
                    <div id="ssoButtons" style="display:none;gap:.5rem;flex-direction:column;"></div>
                </div>

                <!-- Step 2: MFA (hidden initially) -->
                <div id="loginStep2" style="display:none;">
                    <div style="text-align:center;margin-bottom:1.25rem;">
                        <i class="fas fa-shield-alt" style="font-size:1.75rem;color:#3b82f6;margin-bottom:.5rem;display:block;"></i>
                        <div style="font-size:.85rem;color:#e2e8f0;font-weight:500;">Two-Factor Authentication</div>
                        <p style="font-size:.72rem;color:#64748b;margin-top:.2rem;">Enter the 6-digit code from your authenticator app</p>
                    </div>
                    <div class="form-group">
                        <label for="mfaToken">Authentication Code</label>
                        <input type="text" id="mfaToken" name="mfaToken" placeholder="000000" maxlength="6" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" style="text-align:center;font-size:1.5rem;letter-spacing:.5rem;font-family:monospace;" required>
                    </div>
                    <div style="text-align:center;margin-bottom:1rem;">
                        <a href="#" id="useRecoveryCodeLink" style="font-size:.72rem;color:#64748b;text-decoration:none;">Use a recovery code instead</a>
                    </div>
                    <div id="recoveryCodeSection" style="display:none;" class="form-group">
                        <label for="recoveryCode">Recovery Code</label>
                        <input type="text" id="recoveryCode" name="recoveryCode" placeholder="XXXX-XXXX" autocomplete="off">
                    </div>
                    <button type="submit" class="btn btn-primary" id="mfaVerifyBtn">
                        <span id="mfaBtnText">Verify</span>
                        <span class="spinner" id="mfaBtnSpinner"></span>
                    </button>
                    <div style="text-align:center;margin-top:.75rem;">
                        <a href="#" id="backToLoginLink" style="font-size:.72rem;color:#64748b;text-decoration:none;">&larr; Back to login</a>
                    </div>
                </div>
            </form>
            <div class="security-badge">
                <i class="fas fa-lock" style="color:#475569;"></i>
                Secured with PBKDF2 + AES-256
            </div>
        </div>
        <div class="footer">
            OPB Index Options v2.53.0 &middot; Enterprise Edition
        </div>
    </div>

    <script nonce="{{ nonce }}">
        let _loginCredentials = {};

        // ── SSO Provider icons and names ───────────────────────────────────────
        const SSO_PROVIDERS = {
            google: { icon: 'fab fa-google', color: '#ea4335', bg: 'rgba(234,67,53,.08)', name: 'Google' },
            microsoft: { icon: 'fab fa-microsoft', color: '#00a4ef', bg: 'rgba(0,164,239,.08)', name: 'Microsoft' },
            github: { icon: 'fab fa-github', color: '#fff', bg: 'rgba(255,255,255,.06)', name: 'GitHub' },
        };

        // ── Check SSO providers on load ───────────────────────────────────────
        async function checkSSOProviders() {
            try {
                const res = await fetch('/api/auth/sso/providers', {
                    credentials: 'include',
                    headers: { 'Accept': 'application/json' },
                });
                if (!res.ok) return;
                const data = await res.json();
                if (data && data.providers && data.providers.length > 0) {
                    renderSSOButtons(data.providers);
                }
            } catch (e) {
                // SSO check is non-critical; silently ignore errors
            }
        }

        function renderSSOButtons(providers) {
            const container = document.getElementById('ssoButtons');
            const divider = document.getElementById('ssoDivider');
            if (!container || !divider) return;

            let html = '';
            providers.forEach(function(p) {
                const cfg = SSO_PROVIDERS[p] || { icon: 'fas fa-key', color: '#64748b', bg: 'rgba(148,163,184,.08)', name: p.charAt(0).toUpperCase() + p.slice(1) };
                html += '<button type="button" class="btn sso-btn" data-provider="' + p + '" style="background:' + cfg.bg + ';border:1px solid rgba(148,163,184,.1);color:var(--text-secondary);">';
                html += '<i class="' + cfg.icon + '" style="color:' + cfg.color + ';"></i>';
                html += 'Sign in with ' + cfg.name;
                html += '</button>';
            });

            if (html) {
                container.innerHTML = html;
                container.style.display = 'flex';
                divider.style.display = 'block';

                // Bind click handlers
                container.querySelectorAll('.sso-btn').forEach(function(btn) {
                    btn.addEventListener('click', function() {
                        const provider = this.dataset.provider;
                        redirectSSOLogin(provider);
                    });
                });
            }
        }

        async function redirectSSOLogin(provider) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.classList.remove('visible');

            try {
                const res = await fetch('/api/auth/sso/login?provider=' + encodeURIComponent(provider), {
                    credentials: 'include',
                    headers: { 'Accept': 'application/json' },
                });
                const data = await res.json();
                if (res.ok && data.authorization_url) {
                    // Redirect to SSO provider
                    window.location.href = data.authorization_url;
                } else {
                    const detail = data.detail || {};
                    const msg = detail.message || 'SSO login not available';
                    errorMsg.textContent = msg;
                    if (detail.hint) {
                        errorMsg.textContent += '. ' + detail.hint;
                    }
                    errorMsg.classList.add('visible');
                }
            } catch (e) {
                errorMsg.textContent = 'Connection error. Please try again.';
                errorMsg.classList.add('visible');
            }
        }

        // Check SSO providers on page load
        document.addEventListener('DOMContentLoaded', checkSSOProviders);

        // ── Toggle recovery code input ───────────────────────────────────────
        document.getElementById('useRecoveryCodeLink')?.addEventListener('click', function(e) {
            e.preventDefault();
            const rc = document.getElementById('recoveryCodeSection');
            const isHidden = rc.style.display === 'none';
            rc.style.display = isHidden ? 'block' : 'none';
            this.textContent = isHidden ? 'Use authenticator app code instead' : 'Use a recovery code instead';
            if (isHidden) {
                document.getElementById('recoveryCode').focus();
            } else {
                document.getElementById('mfaToken').focus();
            }
        });

        // ── Back to login link ──────────────────────────────────────────────
        document.getElementById('backToLoginLink')?.addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('loginStep1').style.display = 'block';
            document.getElementById('loginStep2').style.display = 'none';
            document.getElementById('errorMsg').classList.remove('visible');
        });

        // ── Login form submit (Step 1) ──────────────────────────────────────
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            // Check if we're in MFA step
            if (document.getElementById('loginStep2').style.display !== 'none') {
                // MFA verification
                await verifyMFA();
                return;
            }

            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('btnSpinner');
            const errorMsg = document.getElementById('errorMsg');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            errorMsg.classList.remove('visible');
            if (!username || !password) {
                errorMsg.textContent = 'Username and password are required';
                errorMsg.classList.add('visible');
                return;
            }

            btn.disabled = true;
            btnText.textContent = 'Signing In...';
            spinner.classList.add('visible');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include',
                });
                const data = await res.json();
                if (res.ok) {
                    if (data.must_change_password) {
                        window.location.href = '/change-password?force=true';
                        return;
                    }
                    if (data.mfa_required) {
                        // Save credentials for MFA step
                        _loginCredentials = { username, password };
                        // Switch to MFA step
                        document.getElementById('loginStep1').style.display = 'none';
                        document.getElementById('loginStep2').style.display = 'block';
                        document.getElementById('mfaToken').focus();
                        btn.disabled = false;
                        btnText.textContent = 'Sign In';
                        spinner.classList.remove('visible');
                        return;
                    }
                    window.location.href = '/';
                } else {
                    errorMsg.textContent = data.detail || 'Invalid username or password';
                    errorMsg.classList.add('visible');
                    btn.disabled = false;
                    btnText.textContent = 'Sign In';
                    spinner.classList.remove('visible');
                }
            } catch (err) {
                errorMsg.textContent = 'Connection error. Please try again.';
                errorMsg.classList.add('visible');
                btn.disabled = false;
                btnText.textContent = 'Sign In';
                spinner.classList.remove('visible');
            }
        });

        // ── MFA Verification ────────────────────────────────────────────────
        async function verifyMFA() {
            const btn = document.getElementById('mfaVerifyBtn');
            const btnText = document.getElementById('mfaBtnText');
            const spinner = document.getElementById('mfaBtnSpinner');
            const errorMsg = document.getElementById('errorMsg');
            const token = document.getElementById('mfaToken').value.trim();
            const recoveryCode = document.getElementById('recoveryCode').value.trim();

            errorMsg.classList.remove('visible');

            if (!token && !recoveryCode) {
                errorMsg.textContent = 'Please enter your authentication code or recovery code';
                errorMsg.classList.add('visible');
                return;
            }

            // Validate TOTP format (6 digits)
            if (token && (token.length !== 6 || !/^\d+$/.test(token))) {
                errorMsg.textContent = 'Authentication code must be 6 digits';
                errorMsg.classList.add('visible');
                return;
            }

            btn.disabled = true;
            btnText.textContent = 'Verifying...';
            spinner.classList.add('visible');

            try {
                const body = recoveryCode
                    ? { recovery_code: recoveryCode }
                    : { token: token };

                const res = await fetch('/api/auth/mfa/verify-session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                    credentials: 'include',
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    window.location.href = '/';
                } else {
                    errorMsg.textContent = data.detail || 'Invalid verification code';
                    errorMsg.classList.add('visible');
                    btn.disabled = false;
                    btnText.textContent = 'Verify';
                    spinner.classList.remove('visible');
                    document.getElementById('mfaToken').value = '';
                    document.getElementById('mfaToken').focus();
                }
            } catch (err) {
                errorMsg.textContent = 'Verification error. Please try again.';
                errorMsg.classList.add('visible');
                btn.disabled = false;
                btnText.textContent = 'Verify';
                spinner.classList.remove('visible');
            }
        }

        // Auto-focus MFA token field and navigate on Enter
        document.getElementById('mfaToken')?.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                verifyMFA();
            }
        });

        document.getElementById('recoveryCode')?.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                // If recovery code section is visible, try to verify
                if (document.getElementById('recoveryCodeSection').style.display !== 'none') {
                    verifyMFA();
                }
            }
        });

        document.getElementById('username').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('password').focus();
        });
    </script>
</body>
</html>
