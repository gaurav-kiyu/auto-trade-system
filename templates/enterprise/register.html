<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPB — First-Time Setup</title>
    <script src="/static/tailwind.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: #080b10; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: linear-gradient(135deg, #1a1f2e 0%, #0f1319 100%); border: 1px solid rgba(148,163,184,0.1); border-radius: 1rem; padding: 2.5rem; max-width: 420px; width: 90%; }
        h1 { text-align: center; font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem; }
        .input-field { width: 100%; padding: 0.75rem 1rem; background: #1a1f2e; border: 1px solid rgba(148,163,184,0.15); border-radius: 0.5rem; color: #e2e8f0; font-size: 0.875rem; outline: none; }
        .input-field:focus { border-color: #3b82f6; }
        .btn-primary { width: 100%; padding: 0.75rem; background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; border: none; border-radius: 0.5rem; font-weight: 600; cursor: pointer; }
        .error { color: #f87171; font-size: 0.8rem; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>First-Time Setup</h1>
        <p style="text-align:center;color:#64748b;font-size:0.875rem;margin-bottom:1.5rem;">Create the first admin account to initialize the system.</p>
        <form id="registerForm" style="display:flex;flex-direction:column;gap:1rem;">
            <input type="text" id="username" class="input-field" placeholder="Username" value="admin" readonly>
            <input type="text" id="displayName" class="input-field" placeholder="Display Name">
            <input type="password" id="password" class="input-field" placeholder="Password" required>
            <input type="password" id="confirm" class="input-field" placeholder="Confirm Password" required>
            <div id="errorMsg" class="error"></div>
            <button type="submit" class="btn-primary">Initialize System</button>
        </form>
    </div>
    <script nonce="{{ nonce }}">
        function getCookie(name) {
            const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            return match ? decodeURIComponent(match[2]) : '';
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const p = document.getElementById('password').value;
            const c = document.getElementById('confirm').value;
            const errEl = document.getElementById('errorMsg');
            errEl.style.display = 'none';
            if (p !== c) { errEl.textContent='Passwords do not match'; errEl.style.display='block'; return; }
            try {
                const res = await fetch('/api/auth/users', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': getCookie('opb_csrf'),
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        display_name: document.getElementById('displayName').value,
                        role: 'admin',
                        password: p,
                    }),
                });
                const data = await res.json();
                if (!res.ok) {
                    errEl.textContent = data.detail || data.error || 'Failed to create user';
                    if (res.status === 401 || res.status === 403) {
                        errEl.textContent = 'Please log in as admin first. ' + (data.detail || '');
                    }
                    errEl.style.display = 'block';
                    return;
                }
                window.location.href = '/';
            } catch(err) {
                errEl.textContent = 'Connection error';
                errEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
