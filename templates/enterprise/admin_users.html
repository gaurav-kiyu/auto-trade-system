<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPB — User Management</title>
    <script src="/static/tailwind.min.js"></script>
    <link rel="stylesheet" href="/static/fontawesome.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: #080b10; color: #e2e8f0; min-height: 100vh; padding: 2rem; }
        .back-link { color: #3b82f6; text-decoration: none; font-size: 0.875rem; display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem; }
        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; }
        .card { background: linear-gradient(135deg, #1a1f2e 0%, #0f1319 100%); border: 1px solid rgba(148,163,184,0.1); border-radius: 0.75rem; padding: 1.5rem; margin-bottom: 1.5rem; }
        .table { width: 100%; border-collapse: collapse; }
        .table th { text-align: left; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; color: #64748b; padding: 0.6rem 0.75rem; border-bottom: 1px solid rgba(148,163,184,0.08); }
        .table td { font-size: 0.8rem; padding: 0.6rem 0.75rem; border-bottom: 1px solid rgba(148,163,184,0.05); color: #cbd5e1; }
        .table tr:hover td { background: rgba(59,130,246,0.03); }
        .badge { display: inline-flex; padding: 0.15rem 0.5rem; border-radius: 1rem; font-size: 0.7rem; font-weight: 500; }
        .badge-admin { background: rgba(59,130,246,0.12); color: #60a5fa; border: 1px solid rgba(59,130,246,0.2); }
        .badge-operator { background: rgba(245,158,11,0.12); color: #fbbf24; border: 1px solid rgba(245,158,11,0.2); }
        .badge-viewer { background: rgba(148,163,184,0.1); color: #94a3b8; border: 1px solid rgba(148,163,184,0.15); }
        .badge-disabled { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.15); }
        .badge-active { background: rgba(34,197,94,0.1); color: #4ade80; border: 1px solid rgba(34,197,94,0.15); }
        .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.8rem; font-weight: 500; cursor: pointer; border: none; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-sm { padding: 0.3rem 0.6rem; font-size: 0.75rem; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 9999; display: none; align-items: center; justify-content: center; }
        .modal-overlay.visible { display: flex; }
        .modal { background: #1a1f2e; border: 1px solid rgba(148,163,184,0.12); border-radius: 1rem; padding: 1.5rem; max-width: 480px; width: 90%; }
        .input-field { width: 100%; padding: 0.6rem 0.8rem; background: #0f1319; border: 1px solid rgba(148,163,184,0.15); border-radius: 0.5rem; color: #e2e8f0; font-size: 0.875rem; outline: none; }
        .input-field:focus { border-color: #3b82f6; }
        select.input-field { cursor: pointer; }
        .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
        .toast { padding: 0.75rem 1.25rem; border-radius: 0.5rem; color: white; font-size: 0.8rem; opacity: 0; transform: translateY(1rem); transition: all 0.3s ease; }
        .toast.visible { opacity: 1; transform: translateY(0); }
        .toast.success { background: #065f46; border-left: 3px solid #22c55e; }
        .toast.error { background: #7f1d1d; border-left: 3px solid #ef4444; }
    </style>
</head>
<body>
    <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    <h1><i class="fas fa-users" style="margin-right:0.5rem;color:#3b82f6;"></i> User Management</h1>

    <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
            <h3 style="font-size:0.95rem;font-weight:600;">All Users</h3>
            <button class="btn btn-primary btn-sm" id="createUserBtn"><i class="fas fa-plus"></i> Create User</button>
        </div>
        <table class="table">
            <thead><tr><th>Username</th><th>Display Name</th><th>Role</th><th>Status</th><th>Created</th><th>Actions</th></tr></thead>
            <tbody id="usersTableBody"><tr><td colspan="6" style="text-align:center;color:#64748b;">Loading...</td></tr></tbody>
        </table>
    </div>

    <div class="card">
        <h3 style="font-size:0.95rem;font-weight:600;margin-bottom:1rem;">Auth Audit Log</h3>
        <table class="table">
            <thead><tr><th>Time</th><th>Event</th><th>Username</th><th>IP</th><th>Success</th></tr></thead>
            <tbody id="auditTableBody"><tr><td colspan="5" style="text-align:center;color:#64748b;">Loading...</td></tr></tbody>
        </table>
    </div>

    <div id="createModal" class="modal-overlay">
        <div class="modal">
            <h3 style="font-size:1rem;font-weight:600;margin-bottom:1rem;"><i class="fas fa-user-plus" style="color:#3b82f6;margin-right:0.5rem;"></i> Create User</h3>
            <form id="createForm" style="display:flex;flex-direction:column;gap:0.75rem;">
                <input type="text" id="newUsername" class="input-field" placeholder="Username" required>
                <input type="text" id="newDisplayName" class="input-field" placeholder="Display Name">
                <select id="newRole" class="input-field"><option value="viewer">Viewer</option><option value="operator">Operator</option><option value="admin">Admin</option></select>
                <input type="password" id="newPassword" class="input-field" placeholder="Password" required>
                <div id="createError" style="color:#ef4444;font-size:0.8rem;display:none;"></div>
                <div class="modal-actions" style="display:flex;gap:0.75rem;justify-content:flex-end;margin-top:0.5rem;">
                    <button type="button" class="btn btn-sm" style="background:#334155;color:white;" id="closeCreateBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary btn-sm">Create</button>
                </div>
            </form>
        </div>
    </div>

    <div id="resetModal" class="modal-overlay">
        <div class="modal">
            <h3 style="font-size:1rem;font-weight:600;margin-bottom:1rem;"><i class="fas fa-key" style="color:#f59e0b;margin-right:0.5rem;"></i> Reset Password</h3>
            <p style="font-size:0.85rem;color:#94a3b8;margin-bottom:1rem;">Reset password for <strong id="resetUsername" style="color:#e2e8f0;"></strong></p>
            <input type="password" id="resetPassword" class="input-field" placeholder="New password" required>
            <div id="resetError" style="color:#ef4444;font-size:0.8rem;display:none;"></div>
            <div class="modal-actions" style="display:flex;gap:0.75rem;justify-content:flex-end;margin-top:1rem;">
                <button class="btn btn-sm" style="background:#334155;color:white;" id="closeResetBtn">Cancel</button>
                <button class="btn btn-primary btn-sm" id="executeResetBtn">Reset</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script nonce="{{ nonce }}">
        let editingUser = null;
        function getCookie(name) {
            const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            return match ? decodeURIComponent(match[2]) : '';
        }

        function showToast(msg, type='info') { const c=document.getElementById('toastContainer'); const t=document.createElement('div'); t.className=`toast ${type} visible`; t.textContent=msg; c.appendChild(t); setTimeout(()=>{t.classList.remove('visible');setTimeout(()=>t.remove(),300);},3500); }

        async function apiFetch(url, opts={}) {
            const csrfToken = getCookie('opb_csrf');
            const headers = {'Content-Type':'application/json',...opts.headers};
            if (csrfToken && opts.method && opts.method !== 'GET') {
                headers['X-CSRF-Token'] = csrfToken;
            }
            const res = await fetch(url, {headers, credentials:'include',...opts});
            if (res.status===401) { window.location.href='/login'; return null; }
            return res.json();
        }

        async function loadUsers() {
            const users = await apiFetch('/api/auth/users');
            const tbody = document.getElementById('usersTableBody');
            if (!users || users.length===0) { tbody.innerHTML='<tr><td colspan="6" style="text-align:center;color:#64748b;">No users</td></tr>'; return; }
            tbody.innerHTML = users.map(u => {
                const roleBadge = `badge-${u.role}`;
                const statusBadge = u.disabled ? 'badge-disabled' : 'badge-active';
                const statusText = u.disabled ? 'Disabled' : 'Active';
                const mustChange = u.must_change_password ? ' <span style="color:#f59e0b;font-size:0.7rem;">(pwd reset)</span>' : '';
                const resetBtn = u.username!=='admin' ? `<button class="btn btn-sm action-btn" style="background:#334155;color:white;" data-action="reset" data-username="${u.username}"><i class="fas fa-key"></i></button>` : '';
                return `<tr><td style="font-weight:500;">${u.username}${mustChange}</td><td>${u.display_name||'—'}</td><td><span class="badge ${roleBadge}">${u.role}</span></td><td><span class="badge ${statusBadge}">${statusText}</span></td><td style="color:#64748b;">${new Date(u.created_ts*1000).toLocaleDateString()}</td><td><div style="display:flex;gap:0.35rem;">${resetBtn}<button class="btn btn-sm action-btn" style="background:#334155;color:white;" data-action="toggle" data-username="${u.username}" data-disabled="${u.disabled}">${u.disabled?'<i class="fas fa-check"></i>':'<i class="fas fa-ban"></i>'}</button></div></td></tr>`;
            }).join('');
            // Bind action buttons
            document.querySelectorAll('.action-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    const action = this.dataset.action;
                    const username = this.dataset.username;
                    if (action === 'reset') { showResetModal(username); }
                    else if (action === 'toggle') { toggleUser(username, this.dataset.disabled === 'true'); }
                });
            });
        }

        async function loadAudit() {
            const logs = await apiFetch('/api/auth/audit?limit=50');
            const tbody = document.getElementById('auditTableBody');
            if (!logs || logs.length===0) { tbody.innerHTML='<tr><td colspan="5" style="text-align:center;color:#64748b;">No audit entries</td></tr>'; return; }
            tbody.innerHTML = logs.slice(0,20).map(l => `<tr><td style="color:#64748b;">${new Date(l.timestamp*1000).toLocaleString()}</td><td>${l.event_type}</td><td>${l.username||'—'}</td><td style="color:#64748b;">${l.ip_address||'—'}</td><td><span class="badge ${l.success?'badge-active':'badge-disabled'}">${l.success?'Yes':'No'}</span></td></tr>`).join('');
        }

        function showCreateModal() { document.getElementById('createModal').classList.add('visible'); }
        function closeCreateModal() { document.getElementById('createModal').classList.remove('visible'); }

        function showResetModal(username) {
            editingUser = username;
            document.getElementById('resetUsername').textContent = username;
            document.getElementById('resetModal').classList.add('visible');
        }
        function closeResetModal() { document.getElementById('resetModal').classList.remove('visible'); }

        async function executeReset() {
            const pwd = document.getElementById('resetPassword').value;
            const errEl = document.getElementById('resetError');
            errEl.style.display = 'none';
            const res = await apiFetch(`/api/auth/users/${editingUser}/reset-password`, {
                method: 'POST',
                body: JSON.stringify({ new_password: pwd }),
            });
            if (!res || !res.success) { errEl.textContent = res?.error || 'Failed'; errEl.style.display='block'; return; }
            showToast('Password reset — user must change on next login', 'success');
            closeResetModal();
            loadUsers();
        }

        async function toggleUser(username, disabled) {
            const endpoint = disabled ? 'enable' : 'disable';
            const res = await apiFetch(`/api/auth/users/${username}/${endpoint}`, { method: 'POST' });
            if (!res || !res.success) { showToast('Failed to '+endpoint+' user', 'error'); return; }
            showToast(`User ${disabled ? 'enabled' : 'disabled'}`, 'success');
            loadUsers();
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('createUserBtn')?.addEventListener('click', showCreateModal);
            document.getElementById('closeCreateBtn')?.addEventListener('click', closeCreateModal);
            document.getElementById('closeResetBtn')?.addEventListener('click', closeResetModal);
            document.getElementById('executeResetBtn')?.addEventListener('click', executeReset);
            document.getElementById('createForm')?.addEventListener('submit', async function(e) {
                e.preventDefault();
                const errEl = document.getElementById('createError');
                errEl.style.display = 'none';
                const res = await apiFetch('/api/auth/users', {
                    method: 'POST',
                    body: JSON.stringify({
                        username: document.getElementById('newUsername').value,
                        display_name: document.getElementById('newDisplayName').value,
                        role: document.getElementById('newRole').value,
                        password: document.getElementById('newPassword').value,
                    }),
                });
                if (!res || !res.success) { errEl.textContent = res?.error || 'Failed'; errEl.style.display='block'; return; }
                showToast('User created', 'success');
                closeCreateModal();
                loadUsers();
            });
        });

        loadUsers();
        loadAudit();
    </script>
</body>
</html>
