# OPB Bot — Grafana Datasource Provisioning
# ─────────────────────────────────────────────────────────────────────────────
# Automatically configures data sources when Grafana starts.
# Placed at: /etc/grafana/provisioning/datasources/
#
# Datasources:
#   - Loki (logs)
#   - Prometheus (metrics) — if running
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: false
    jsonData:
      timeout: 60
      maxLines: 5000
      derivedFields:
        - datasourceUid: prometheus
          matcherRegex: "trace_id=(\\w+)"
          name: TraceID
          url: '$${__value.raw}'

  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://opb:9090  # OPB bot's Prometheus metrics endpoint (Docker Compose service name)
    isDefault: false
    editable: false
    jsonData:
      timeInterval: 15s
      queryTimeout: 30s
      httpMethod: POST
