# GitHub Actions CI — OPB Index Options Trading Platform
#
# Parallel test execution across 4 shards using pytest-split.
# Mirror of the existing Bitbucket Pipelines configuration.

name: CI

on:
  push:
    branches: [main, develop, "release/**"]
    tags: ["v*"]
  pull_request:
    branches: ["**"]

env:
  PYTHON_VERSION: "3.11"
  PYTEST_ADDOPTS: "--tb=short -q"

jobs:
  # ── Fast-fail lint — blocks other jobs if it fails ──────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install ruff mypy
      - run: ruff check .
      - run: mypy . --ignore-missing-imports || true

  # ── Test suite — split across 4 parallel shards ────────────────────────
  test:
    name: Test (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]" pytest-split
      - run: |
          python -m pytest tests/ \
            --splits 4 --group ${{ matrix.shard }} \
            --splitting-algo=least_duration \
            -x --junitxml=reports/test-results-${{ matrix.shard }}.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.shard }}
          path: reports/test-results-${{ matrix.shard }}.xml

  # ── Coverage ────────────────────────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]" coverage
      - run: python -m coverage run -m pytest tests/ -k "not slow" -x
      - run: python -m coverage report --fail-under=70 --show-missing

  # ── Security audit ──────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install pip-audit bandit
      - run: pip-audit || true
      - run: bandit -r core/ scripts/ -f json -o reports/bandit-report.json || true

  # ── Governance checks ───────────────────────────────────────────────────
  governance:
    name: Governance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: python scripts/pre_implementation_check.py --check-risk || true
      - run: python scripts/score_system.py --ci --check-min 5.0 || true
      - run: python scripts/hygiene_check.py --ci || true
      - run: python scripts/scan_dead_code.py --ci || true

  # ── Certification ───────────────────────────────────────────────────────
  certification:
    name: Certification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: python -m core.certification.gate --json || true

  # ── Build (main branch + tags only) ─────────────────────────────────────
  build:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test, coverage, security, governance]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install build
      - run: make dist
      - run: make checksum
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            ../*.tar.gz
            ../*.sha256
