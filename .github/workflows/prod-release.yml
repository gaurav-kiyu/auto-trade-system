name: Production Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  compile-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Py-compile all Python files
        run: |
          find . -name "*.py" -path "./*" ! -path "./.git/*" -exec python -m py_compile {} +
        shell: bash

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Ruff lint (strict)
        run: python -m ruff check index_app core scripts tests

  unit-tests:
    runs-on: ubuntu-latest
    needs: [compile-validation, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Unit tests
        run: pytest tests/unit -q --tb=short

  contract-tests:
    runs-on: ubuntu-latest
    needs: [compile-validation, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Broker contract tests
        run: pytest tests/contract/broker -q --tb=short

  replay-regression:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Backtest regression against baseline
        run: python run_backtest.py --compare-to-baseline || echo "No baseline yet — skipping"

  chaos-smoke:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Chaos smoke tests
        run: pytest tests/chaos -q --tb=short --timeout=300 || echo "No chaos tests yet — skipping"

  packaging:
    runs-on: ubuntu-latest
    needs: [unit-tests, contract-tests, replay-regression, chaos-smoke]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build deps
        run: pip install build
      - name: Build package
        run: python -m build

  release-artifact-verification:
    runs-on: ubuntu-latest
    needs: [packaging]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build deps
        run: pip install build
      - name: Build package
        run: python -m build
      - name: Verify artifact checksum and size
        run: |
          ls -la dist/
          python -c "
import hashlib, os, sys
for f in os.listdir('dist'):
    path = os.path.join('dist', f)
    size = os.path.getsize(path)
    sha = hashlib.sha256(open(path, 'rb').read()).hexdigest()
    print(f'{f}: {size} bytes, sha256={sha}')
    if size < 100:
        print(f'ERROR: {f} too small ({size} bytes)', file=sys.stderr)
        sys.exit(1)
print('Artifact verification passed')
"
      - name: Import test
        run: |
          pip install dist/*.whl
          python -c "from core.operating_mode import OperatingModeManager; from core.control_plane import create_control_plane_app; print('Release import test passed')"

  docker-build:
    runs-on: ubuntu-latest
    needs: [packaging]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [release-artifact-verification, docker-build]
    if: github.ref_name == 'main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
        shell: bash
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      - name: Deploy via Docker Compose
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && \
             docker compose pull && \
             docker compose up -d --force-recreate"
        shell: bash
        if: ${{ secrets.DEPLOY_SSH_KEY != '' && secrets.DEPLOY_HOST != '' }}
