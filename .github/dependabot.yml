version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automated"
    reviewers:
      - "gaurav-kiyu"
    allow:
      - dependency-type: "direct"
    ignore:
      - dependency-name: "numpy"
        versions: [">=2.0.0"]  # pin numpy <2 for compatibility
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
