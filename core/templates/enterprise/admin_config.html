<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-900">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Config Management - OPB Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full bg-gray-900">
    <nav class="bg-gray-800 border-b border-gray-700">
        <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
            <div class="flex h-16 items-center justify-between">
                <div class="flex items-center">
                    <a href="/" class="text-xl font-bold text-white">OPB Enterprise</a>
                    <div class="ml-10 flex space-x-4">
                        <a href="/" class="text-gray-300 hover:bg-gray-700 hover:text-white px-3 py-2 rounded-md text-sm">Dashboard</a>
                        <a href="/admin/users" class="text-gray-300 hover:bg-gray-700 hover:text-white px-3 py-2 rounded-md text-sm">Users</a>
                        <a href="/admin/config" class="bg-gray-900 text-white px-3 py-2 rounded-md text-sm font-medium">Config</a>
                        <a href="/admin/kill-switch" class="text-gray-300 hover:bg-gray-700 hover:text-white px-3 py-2 rounded-md text-sm">Kill Switch</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    <main class="mx-auto max-w-7xl py-6 px-4">
        <h2 class="text-2xl font-bold text-white mb-6">Configuration Management</h2>
        <div class="bg-gray-800 rounded-lg p-6">
            <div id="config-viewer" class="text-gray-300">
                <p>Loading configuration...</p>
            </div>
        </div>
    </main>
    <script nonce="{{ nonce }}">
        fetch('/api/config').then(r => r.json()).then(data => {
            const entries = Object.entries(data.config || {}).slice(0, 50);
            const html = entries.length ? `
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-700 text-sm">
                        <thead><tr class="text-left text-gray-400">
                            <th class="py-2 pr-4">Key</th><th class="py-2">Value</th>
                        </tr></thead>
                        <tbody class="divide-y divide-gray-700">
                            ${entries.map(([k, v]) => `<tr class="text-gray-300"><td class="py-2 pr-4 font-mono">${k}</td><td class="py-2 font-mono">${typeof v === 'string' ? v : JSON.stringify(v)}</td></tr>`).join('')}
                        </tbody>
                    </table>
                </div>
                <p class="text-gray-500 text-xs mt-4">Showing ${entries.length} of ${Object.keys(data.config).length} keys</p>
            ` : '<p>No configuration loaded</p>';
            document.getElementById('config-viewer').innerHTML = html;
        }).catch(() => {
            document.getElementById('config-viewer').innerHTML = '<p class="text-red-400">Failed to load configuration</p>';
        });
    </script>
</body>
</html>
