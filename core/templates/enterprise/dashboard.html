<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-900">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPB Enterprise Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script nonce="{{ nonce }}">
        tailwind.config = { theme: { extend: { colors: { primary: { '50': '#eff6ff', '100': '#dbeafe', '200': '#bfdbfe', '300': '#93c5fd', '400': '#60a5fa', '500': '#3b82f6', '600': '#2563eb', '700': '#1d4ed8', '800': '#1e40af', '900': '#1e3a8a' } } } } }
    </script>
</head>
<body class="h-full bg-gray-900">
    <div class="min-h-full">
        <nav class="bg-gray-800 border-b border-gray-700">
            <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
                <div class="flex h-16 items-center justify-between">
                    <div class="flex items-center">
                        <div class="text-xl font-bold text-white">OPB Enterprise</div>
                        <div class="ml-10 flex space-x-4">
                            <a href="/" class="text-gray-300 hover:bg-gray-700 hover:text-white px-3 py-2 rounded-md text-sm font-medium">Dashboard</a>
                            <a href="/admin/config" class="text-gray-300 hover:bg-gray-700 hover:text-white px-3 py-2 rounded-md text-sm font-medium">Config</a>
                            <a href="/admin/users" class="text-gray-300 hover:bg-gray-700 hover:text-white px-3 py-2 rounded-md text-sm font-medium">Users</a>
                            <a href="/admin/kill-switch" class="text-gray-300 hover:bg-gray-700 hover:text-white px-3 py-2 rounded-md text-sm font-medium">Kill Switch</a>
                        </div>
                    </div>
                    <div class="flex items-center space-x-4">
                        <span class="text-gray-400 text-sm">{{ user.display_name }}</span>
                        <a href="/change-password" class="text-gray-400 hover:text-white text-sm">Change Password</a>
                        <a href="/api/auth/logout" class="text-gray-400 hover:text-white text-sm">Logout</a>
                    </div>
                </div>
            </div>
        </nav>
        <main class="mx-auto max-w-7xl py-6 sm:px-6 lg:px-8">
            <div class="px-4 py-6 sm:px-0">
                <div class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
                    <div class="bg-gray-800 rounded-lg p-6">
                        <h3 class="text-lg font-medium text-white">System Status</h3>
                        <div id="system-status" class="mt-4 text-gray-300">
                            <p class="text-sm">Loading...</p>
                        </div>
                    </div>
                    <div class="bg-gray-800 rounded-lg p-6">
                        <h3 class="text-lg font-medium text-white">Recent Signals</h3>
                        <div id="recent-signals" class="mt-4 text-gray-300">
                            <p class="text-sm">Loading...</p>
                        </div>
                    </div>
                    <div class="bg-gray-800 rounded-lg p-6">
                        <h3 class="text-lg font-medium text-white">Notifications</h3>
                        <div id="notifications" class="mt-4 text-gray-300">
                            <p class="text-sm">No notifications</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script nonce="{{ nonce }}">
        fetch('/api/system/state').then(r => r.json()).then(data => {
            document.getElementById('system-status').innerHTML = `
                <p class="text-sm">Status: <span class="${data.paused ? 'text-red-400' : 'text-green-400'}">${data.paused ? 'PAUSED' : 'RUNNING'}</span></p>
                <p class="text-sm">Capital: ₹${data.capital?.toLocaleString() || 'N/A'}</p>
                <p class="text-sm">Open Positions: ${data.open_positions || 0}</p>
                <p class="text-sm">Daily PnL: <span class="${data.daily_pnl >= 0 ? 'text-green-400' : 'text-red-400'}">₹${data.daily_pnl?.toFixed(2) || '0.00'}</span></p>
                <p class="text-sm">Uptime: ${data.uptime_human || 'N/A'}</p>
            `;
        }).catch(() => {
            document.getElementById('system-status').innerHTML = '<p class="text-sm text-red-400">Failed to load system status</p>';
        });
    </script>
</body>
</html>
