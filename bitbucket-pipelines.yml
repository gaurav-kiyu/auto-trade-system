image: python:3.11

options:
  max-time: 30

definitions:
  caches:
    pip: ~/.cache/pip

  steps:
    - step: &lint-step
        name: Lint
        caches: [pip]
        script:
          - pip install ruff mypy
          - ruff check .
          - mypy . --ignore-missing-imports || true
        artifacts:
          - reports/**

    - step: &coverage-step
        name: Coverage
        caches: [pip]
        script:
          - pip install -e ".[dev]" coverage
          - python -m coverage run -m pytest tests/ -q --tb=short -k "not slow" -x
          - python -m coverage report --fail-under=70 --show-missing
          - python -m coverage xml -o reports/coverage.xml
        artifacts:
          - reports/**

    - step: &security-audit-step
        name: Security Audit
        caches: [pip]
        script:
          - pip install pip-audit bandit
          - pip-audit || { echo "FAIL: pip-audit found vulnerabilities"; exit 1; }
          - bandit -r core/ scripts/ -f json -o reports/bandit-report.json || echo "Bandit warnings — review before release"
        artifacts:
          - reports/**

    - step: &benchmark-step
        name: Performance Benchmark
        caches: [pip]
        script:
          - pip install -e ".[dev]"
          - python -m pytest tests/benchmarks/ -q --tb=short --benchmark-json=reports/benchmark.json || echo "No benchmark tests yet"
          - echo "Benchmark results saved to reports/benchmark.json"
        artifacts:
          - reports/**

    - step: &test-step
        name: Test
        caches: [pip]
        script:
          - pip install -e ".[dev]"
          - python -m pytest tests/ -v --tb=short -q -k "not slow" -x --junitxml=reports/test-results.xml
        artifacts:
          - reports/**

    - step: &slow-test-step
        name: Slow Tests
        caches: [pip]
        script:
          - pip install -e ".[dev]"
          - python -m pytest tests/test_signal_safety.py tests/test_manual_signal_mode.py tests/test_smoke.py tests/test_production_extensions.py -v --tb=short -q --junitxml=reports/slow-test-results.xml
        artifacts:
          - reports/**

    - step: &chaos-step
        name: Chaos
        caches: [pip]
        script:
          - pip install -e ".[dev]"
          - python -m pytest tests/chaos/ -v --tb=short -q --junitxml=reports/chaos-results.xml
        artifacts:
          - reports/**

    - step: &exactly-once-step
        name: Exactly-Once
        caches: [pip]
        script:
          - pip install -e ".[dev]"
          - python -m pytest tests/test_exactly_once_certification.py -v --tb=short -q --junitxml=reports/exactly-once-results.xml
        artifacts:
          - reports/**

    - step: &dist-step
        name: Build & Checksum
        caches: [pip]
        script:
          - pip install build
          - make dist
          - make checksum
        artifacts:
          - ../*.tar.gz
          - ../*.sha256

    - step: &release-step
        name: Release
        deployment: production
        trigger: manual
        script:
          - make dist
          - make checksum
          - echo "Release $(cat VERSION) ready: sha256sum ../opbuying-$(cat VERSION).tar.gz"

    - step: &governance-step
        name: Constitution Governance
        caches: [pip]
        script:
          - pip install -e ".[dev]"
          - echo "=== Pre-Implementation Compliance Check ==="
          - python scripts/pre_implementation_check.py --check-risk || echo "WARNING: pre-implementation checks found issues"
          - echo "=== Architecture Compliance (ADR 0010) ==="
          - python scripts/check_architecture_compliance.py --ci
          - echo "=== Constitution Scoring ==="
          - python scripts/score_system.py --ci --check-min 5.0 || echo "WARNING: some scores below 5.0"
          - echo "=== Script & Artifact Sync Check ==="
          - python scripts/sync_artifacts.py --ci || echo "WARNING: artifact sync issues found"
          - echo "=== Repository Hygiene Check ==="
          - python scripts/hygiene_check.py --ci || echo "WARNING: hygiene issues found"
          - echo "=== Dead Code Scan ==="
          - python scripts/scan_dead_code.py --ci || echo "WARNING: dead code found"
        artifacts:
          - reports/**

    - step: &governance-release-step
        name: Release Governance
        caches: [pip]
        trigger: manual
        script:
          - pip install -e ".[dev]"
          - VERSION=$(cat VERSION)
          - echo "=== Pre-Release Validation ==="
          - python scripts/release_governance.py --check --version $VERSION
          - echo "=== Generate Release Notes ==="
          - python scripts/release_governance.py --generate-notes -v $VERSION
          - echo "=== Scoring Report ==="
          - python scripts/score_system.py --json --check-min 6.0
        artifacts:
          - RELEASE_NOTES.md
          - reports/**

pipelines:
  default:
    - parallel:
        - step: *lint-step
        - step: *test-step
        - step: *coverage-step
        - step: *security-audit-step
    - step: *governance-step
    - step: *slow-test-step
    - step: *chaos-step
    - step: *exactly-once-step

  pull-requests:
    '**':
      - parallel:
          - step: *lint-step
          - step: *test-step
      - step: *coverage-step
      - step: *security-audit-step
      - step: *governance-step
      - step: *chaos-step

  branches:
    main:
      - parallel:
          - step: *lint-step
          - step: *test-step
          - step: *coverage-step
          - step: *security-audit-step
      - step: *governance-step
      - step: *slow-test-step
      - step: *chaos-step
      - step: *exactly-once-step
      - step: *benchmark-step
      - step: *dist-step

    develop:
      - parallel:
          - step: *lint-step
          - step: *test-step
      - step: *coverage-step
      - step: *security-audit-step
      - step: *governance-step
      - step: *chaos-step

    release/**:
      - parallel:
          - step: *lint-step
          - step: *test-step
          - step: *coverage-step
          - step: *security-audit-step
      - step: *governance-step
      - step: *slow-test-step
      - step: *chaos-step
      - step: *exactly-once-step
      - step: *benchmark-step
      - step: *dist-step
      - step: *governance-release-step
      - step: *release-step

  tags:
    v*:
      - step: *governance-release-step
      - step: *release-step
